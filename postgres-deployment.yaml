# ============================================================
# postgres-deployment.yaml
# Runs the PostgreSQL 16 database on the dedicated storage node.
#
# Node selection strategy:
#   nodeSelector: node-role: storage
#   The storage node holds the physical volume backing the
#   database. Pinning the pod here keeps the hostPath data
#   directory reachable across restarts.
# ============================================================

# 1. Database Secret
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: root1
  POSTGRES_PASSWORD: "SScc12@#"
  POSTGRES_DB: event_reg_db
---
# 2. PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresdb
  template:
    metadata:
      labels:
        app: postgresdb
    spec:
      nodeSelector:
        node-role: storage
      containers:
        - name: postgresdb
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            # Postgres writes its data under a subdirectory so the
            # mount point itself can stay owned by root on the host.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - root1
                - -d
                - event_reg_db
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: postgres-storage
          # hostPath keeps data on the storage node's filesystem,
          # matching the approach used for the previous MySQL pod.
          hostPath:
            path: /mnt/postgres-data
            type: DirectoryOrCreate
---
# 3. PostgreSQL Internal Service
apiVersion: v1
kind: Service
metadata:
  name: postgresdb
spec:
  type: ClusterIP
  selector:
    app: postgresdb
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
