apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-portal
  template:
    metadata:
      labels:
        app: client-portal
    spec:
      nodeSelector:
        node-role: application
      containers:
        - name: client-portal
          image: client-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: API_BASE_URL
              value: http://localhost:30080
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: client-portal
spec:
  type: NodePort
  selector:
    app: client-portal
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30081