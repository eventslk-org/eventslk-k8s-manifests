# ============================================================
# gateway-deployment.yaml
# Spring Cloud API Gateway — the single external entry point
# for the frontends. Exposed on NodePort 30080 so the existing
# client/admin portal configurations keep working unchanged.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: eventslk-api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eventslk-api-gateway
  template:
    metadata:
      labels:
        app: eventslk-api-gateway
    spec:
      nodeSelector:
        node-role: application
      containers:
        - name: eventslk-api-gateway
          image: kaveengayanga12/eventslk-api-gateway:7819c29627fbb8b95e2775e3334ebc3a37ec4ccb
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eventslk-service-discovery:8761/eureka/
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: eventslk-api-gateway
spec:
  type: NodePort
  selector:
    app: eventslk-api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
