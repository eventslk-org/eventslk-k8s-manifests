# ============================================================
# notification-deployment.yaml
# Notification microservice. Consumes Kafka events emitted by
# the event-registration API and dispatches outbound notices.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: eventslk-notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eventslk-notification-service
  template:
    metadata:
      labels:
        app: eventslk-notification-service
    spec:
      nodeSelector:
        node-role: application
      containers:
        - name: eventslk-notification-service
          image: kaveengayanga12/eventslk-notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eventslk-service-discovery:8761/eureka/

            # --- Kafka configuration ---
            # `kafka:29092` is the in-cluster listener exposed by the
            # broker; switch to the external listener for off-cluster
            # producers/consumers.
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: SPRING_KAFKA_CONSUMER_GROUP_ID
              value: eventslk-notification
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: eventslk-notification-service
spec:
  type: ClusterIP
  selector:
    app: eventslk-notification-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
