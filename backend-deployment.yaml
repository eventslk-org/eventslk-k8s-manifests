# ============================================================
# backend-deployment.yaml
# Runs the Spring Boot API on the application node.
#
# Fix: Added explicit SPRING_DATASOURCE environment variables 
# to resolve "Failed to determine a suitable driver class" error.
# ============================================================

# 1. Backend Specific Secrets
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
stringData:
  JWT_SECRET: 9070a07001f03abb91a1c1171d1454a53e3ebf8ef9062a7b7f9df21dd70f45a0
---
# 2. Spring Boot Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        node-role: application
      containers:
        - name: backend
          # Tagged with the current commit SHA from your logs
          image: kaveengayanga12/eventslk-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            
            # --- Database Configuration Start ---
            # Spring Boot maps these env vars to spring.datasource properties
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/event_reg_db
            
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD

            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"

            # Keep original vars for custom application logic if needed
            - name: DB_HOST
              value: mysql
            - name: DB_PORT
              value: "3306"
            # --- Database Configuration End ---

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
          
          readinessProbe:
            httpGet:
              path: /auth
              port: 8080
            initialDelaySeconds: 60 # Increased delay to allow DB connection
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth
              port: 8080
            initialDelaySeconds: 120 # Increased delay for Hibernate startup
            periodSeconds: 20
---
# 3. Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080