# ============================================================
# backend-deployment.yaml
# Runs the Spring Boot API on the application node.
#
# Node selection strategy:
#   nodeSelector: node-role: application
#   The application node handles stateless workloads (backend,
#   client portal, admin portal). Separating these from the
#   storage node prevents I/O-heavy database operations from
#   competing with CPU/memory-intensive API work.
# ============================================================

# 1. Backend Specific Secrets
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
stringData:
  JWT_SECRET: your_very_secret_jwt_key_here
---
# 2. Spring Boot Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Pin this pod to the node labeled 'node-role=application'.
      # Apply this label to your application node with:
      #   kubectl label node <node-name> node-role=application
      nodeSelector:
        node-role: application
      containers:
        - name: backend
          # The GitHub Actions workflow updates this tag to the commit SHA on every push to main.
          # Starting with 'latest' allows a manual first deployment before CI runs.
          image: kaveengayanga12/eventslk-backend:ee5f9f13776eff80a61fe57170b0f670793d548e
          imagePullPolicy: Always # Always pull so the new SHA-tagged image is fetched after each CI push
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: DB_HOST
              value: mysql # Resolves via the ClusterIP Service named 'mysql'
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
          # Readiness probe — pod only receives traffic once the health endpoint returns 200
          readinessProbe:
            httpGet:
              path: /auth/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          # Liveness probe — Kubernetes restarts the pod if the health endpoint stops responding
          livenessProbe:
            httpGet:
              path: /auth/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
---
# 3. Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: NodePort # Exposes the API on every node's IP at the fixed port below
  selector:
    app: backend
  ports:
    - name: http
      port: 8080       # ClusterIP port (used by other pods inside the cluster)
      targetPort: 8080 # Port the Spring Boot container listens on
      nodePort: 30080  # External port — reachable at <NodeIP>:30080
