# ============================================================
# admin-portal-deployment.yaml
# Runs the React/Nginx admin dashboard on the application node.
#
# Node selection strategy:
#   nodeSelector: node-role: application
#   Stateless frontend containers belong on the application node
#   alongside the backend, keeping all user-facing services on
#   the same host and away from the storage node.
# ============================================================

# 1. Admin Portal Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-portal
  template:
    metadata:
      labels:
        app: admin-portal
    spec:
      # Pin this pod to the node labeled 'node-role=application'.
      # Apply this label to your application node with:
      #   kubectl label node <node-name> node-role=application
      nodeSelector:
        node-role: application
      containers:
        - name: admin-portal
          # GitHub Actions pushes to this repository on every merge to main.
          # The CI workflow re-tags the image as 'latest' after pushing the SHA tag.
          image: kaveengayanga12/eventslk-admin-portal:0fe6338f3710c9aea9a21c5a985a1d1244ccef18
          imagePullPolicy: Always # Always pull so the freshly built image is used after each CI push
          ports:
            - containerPort: 80 # Nginx serves the built React app on port 80
          env:
            # Evaluated in the VISITOR'S BROWSER (env-config.js), so this
            # must be the publicly reachable Kong proxy NodePort — never
            # localhost or a cluster-internal name. REPLACE with your
            # domain / elastic IP.
            - name: API_BASE_URL
              value: http://35.168.70.214:30080
          # Readiness probe — only route traffic here once Nginx serves the root page
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          # Liveness probe — restart the container if Nginx stops responding
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
---
# 2. Admin Portal Service
apiVersion: v1
kind: Service
metadata:
  name: admin-portal
spec:
  type: NodePort # Exposes the admin dashboard on every node's IP at the fixed port below
  selector:
    app: admin-portal
  ports:
    - name: http
      port: 80       # ClusterIP port (used for internal cluster traffic)
      targetPort: 80 # Port Nginx listens on inside the container
      nodePort: 30082 # External port — reachable at <NodeIP>:30082
