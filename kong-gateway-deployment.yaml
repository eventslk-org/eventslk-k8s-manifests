# ============================================================
# kong-gateway-deployment.yaml
# Kong API Gateway running in DB-less (declarative) mode.
# Replaces the Docker Compose Kong setup; host.docker.internal
# upstream targets are swapped for cluster-local Service DNS.
#
# Contains:
#   1. ConfigMap  kong-declarative-config  -> mounts kong.yaml
#   2. Deployment kong-gateway             -> kong:3.5, DB-less
#   3. Service    kong-proxy-svc           -> NodePort 30080 (proxy ONLY)
#   4. Service    kong-admin-svc           -> ClusterIP 8001 (admin, in-cluster only)
#
# Exposure: this cluster is kubeadm + Calico on EC2 (not EKS), so an
# ALB Ingress (aws-load-balancer-controller, target-type: ip) does not
# work here — pod IPs are not VPC-routable. The proxy is exposed on
# NodePort 30080 instead (the Terraform security group already opens
# 30000-32767) and the frontends point API_BASE_URL at
# http://<worker-public-ip-or-domain>:30080.
#
# NOTE: the admin port (8001) lives in its own ClusterIP Service and
# must NEVER be added to the NodePort service — with the SG open on
# the NodePort range that would publish the Kong admin API to the
# internet.
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative-config
  labels:
    app: kong-gateway
data:
  kong.yaml: |
    _format_version: "3.0"
    _transform: true
    services:
      - name: core-platform-service
        host: EVENT-REGISTRATION-API-UPSTREAM
        routes:
          - name: auth-routes
            paths: [/auth]
            strip_path: false
          - name: event-routes
            paths: [/event]
            strip_path: false
          - name: booking-routes
            paths: [/book]
            strip_path: false
          - name: user-routes
            paths: [/user]
            strip_path: false
      # Only the health probe is publicly routable; metrics/env/prometheus
      # stay cluster-internal. In the prod profile actuator lives on the
      # separate management port 9081, hence the dedicated upstream.
      - name: core-actuator-service
        host: EVENT-API-MGMT-UPSTREAM
        routes:
          - name: core-actuator-routes
            paths: [/actuator/health]
            strip_path: false
      - name: notification-api-service
        host: NOTIFICATION-SERVICE-UPSTREAM
        routes:
          - name: notification-actuator-routes
            paths: [/notification/actuator]
            strip_path: true
          - name: notification-debug-routes
            paths: [/notification/debug]
            strip_path: true
    upstreams:
      - name: EVENT-REGISTRATION-API-UPSTREAM
        targets:
          - target: event-registration-api.default.svc.cluster.local:8081
      - name: EVENT-API-MGMT-UPSTREAM
        targets:
          - target: event-registration-api.default.svc.cluster.local:9081
      - name: NOTIFICATION-SERVICE-UPSTREAM
        targets:
          - target: eventslk-notification-service.default.svc.cluster.local:8082
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local
      # SECURITY: the backend trusts X-User-* headers (GatewayHeaderFilter)
      # when no Bearer token is present. Strip them from every inbound client
      # request so only the gateway itself can ever set them.
      - name: request-transformer
        config:
          remove:
            headers:
              - X-User-Name
              - X-User-Roles
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-gateway
  labels:
    app: kong-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong-gateway
  template:
    metadata:
      labels:
        app: kong-gateway
    spec:
      containers:
        - name: kong-gateway
          image: kong:3.5
          imagePullPolicy: IfNotPresent
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /usr/local/kong/declarative/kong.yaml
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr
            - name: KONG_PROXY_LISTEN
              value: 0.0.0.0:8000
            # Admin API bound to localhost would block kubectl/in-cluster
            # access; 0.0.0.0 keeps it reachable but it is only exposed
            # via the ClusterIP Service (never as a LoadBalancer).
            - name: KONG_ADMIN_LISTEN
              value: 0.0.0.0:8001
          ports:
            - name: proxy
              containerPort: 8000
            - name: admin
              containerPort: 8001
          volumeMounts:
            - name: kong-declarative
              mountPath: /usr/local/kong/declarative/
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: kong-declarative
          configMap:
            name: kong-declarative-config
            items:
              - key: kong.yaml
                path: kong.yaml
---
# ------------------------------------------------------------
# Public entry point: Kong proxy on NodePort 30080. This is the
# ONLY externally reachable service of the whole stack besides
# the two portals (30081/30082).
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy-svc
  labels:
    app: kong-gateway
spec:
  type: NodePort
  selector:
    app: kong-gateway
  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
      nodePort: 30080
---
# ------------------------------------------------------------
# Kong Admin API — in-cluster only. Never expose via NodePort,
# LoadBalancer, or Ingress.
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: kong-admin-svc
  labels:
    app: kong-gateway
spec:
  type: ClusterIP
  selector:
    app: kong-gateway
  ports:
    - name: admin
      port: 8001
      targetPort: 8001
