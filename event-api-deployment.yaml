# ============================================================
# event-api-deployment.yaml
# Core event-registration microservice. Talks to PostgreSQL
# via the in-cluster `postgresdb` service and re-uses the
# existing `backend-secret` for the JWT signing key.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-registration-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-registration-api
  template:
    metadata:
      labels:
        app: event-registration-api
    spec:
      nodeSelector:
        node-role: application
      containers:
        - name: event-registration-api
          image: kaveengayanga12/eventslk-event-registration-api:e3c7b66ee1b019a2633012063f528c59e6ee2fa8
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eventslk-service-discovery:8761/eureka/

            # --- Kafka (producer side of the notification pipeline) ---
            # In-cluster broker provided by kafka-deployment.yaml. The
            # NotificationProducer publishes booking/user events here; the
            # eventslk-notification-service consumes them.
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092

            # --- PostgreSQL datasource ---
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgresdb:5432/event_reg_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: org.hibernate.dialect.PostgreSQLDialect

            # --- Auth ---
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /auth
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: event-registration-api
spec:
  type: ClusterIP
  selector:
    app: event-registration-api
  ports:
    - name: http
      port: 8081
      targetPort: 8081
