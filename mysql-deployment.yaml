# ============================================================
# mysql-deployment.yaml (Updated for hostPath)
# Runs the MySQL 8.0 database on the dedicated storage node.
#
# Workaround: Using hostPath instead of PVC because no 
# StorageClass is available in the cluster.
# ============================================================

# 1. Database Secrets
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
type: Opaque
stringData:
  MYSQL_DATABASE: event_reg_db
  MYSQL_USER: event_user
  MYSQL_PASSWORD: "EventLK123@#$"
  MYSQL_ROOT_PASSWORD: "EventLK123@#$"
---
# 2. MySQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      # Pinned to the storage node to ensure hostPath persistence
      nodeSelector:
        node-role: storage
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-secret
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: mysql-storage
          # Using hostPath to bypass the 'unbound PVC' issue.
          # This stores data directly on the Node's filesystem.
          hostPath:
            path: /mnt/mysql-data
            type: DirectoryOrCreate
---
# 3. MySQL Internal Service
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  type: ClusterIP