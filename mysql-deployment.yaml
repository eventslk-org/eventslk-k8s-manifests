# # Node selection strategy:
# #   nodeSelector: node-role: storage
# #   The storage node is expected to have the physical (or EBS)
# #   volume attached to it. Pinning MySQL here ensures the
# #   PersistentVolume is always accessible from the same host,
# #   avoiding cross-node volume attachment issues.
# # ============================================================

